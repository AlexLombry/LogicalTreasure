<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cherche le trésor</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(160deg, #fff1cc 0%, #ffd6ec 50%, #c8eeff 100%);
      color: #3a2c6e;
      font-family: 'Nunito', 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Grid ──────────────────────────────────── */
    .game { display: flex; flex-direction: column; align-items: center; }

    .grid-card {
      background: #fff;
      border-radius: 28px;
      padding: 14px;
      box-shadow: 0 6px 32px rgba(120,60,180,0.18), 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 24px;
      border: 4px solid #e8b4f8;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(7, 61px);
      grid-template-rows: repeat(7, 61px);
      gap: 3px;
      background: #c9b8e8;
      border-radius: 14px;
      overflow: hidden;
      position: relative;
    }

    .cell { background: #f5f0ff; }
    .cell.wall { background: #6b4fa0; }
    .cell.highlight {
      background: #fff176 !important;
      box-shadow: inset 0 0 0 3px #fdd835;
      animation: pulse-cell 0.55s ease infinite alternate;
    }
    @keyframes pulse-cell {
      from { background: #fff9c4; }
      to   { background: #ffe57f; }
    }
    .cell.highlight-error {
      background: #ffcdd2 !important;
      box-shadow: inset 0 0 0 3px #ef9a9a;
      animation: pulse-cell-error 0.55s ease infinite alternate;
    }
    @keyframes pulse-cell-error {
      from { background: #ffcdd2; }
      to   { background: #ef9a9a; }
    }

    /* ── Robot ──────────── */
    .robot {
      position: absolute;
      width: 61px;
      height: 61px;
      pointer-events: none;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      transition: left 0.22s ease, top 0.22s ease, transform 0.18s ease;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }

    .trophy {
      position: absolute;
      width: 61px;
      height: 61px;
      pointer-events: none;
      z-index: 9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }

    /* ── Boutons de commande ────────────────────── */
    .controls { display: flex; gap: 12px; margin-bottom: 18px; }

    .btn {
      font-family: 'Fredoka One', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.02em;
      border: none;
      border-radius: 50px;
      padding: 14px 26px;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-shadow: 0 4px 0 rgba(0,0,0,0.15);
    }
    .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.15); }
    .btn:disabled { opacity: 0.35; cursor: default; transform: none; box-shadow: 0 4px 0 rgba(0,0,0,0.10); }
    .btn-move      { background: #4fc3f7; color: #fff; border-bottom: 4px solid #0288d1; }
    .btn-turn-left { background: #ce93d8; color: #fff; border-bottom: 4px solid #7b1fa2; }
    .btn-turn      { background: #f48fb1; color: #fff; border-bottom: 4px solid #c2185b; }

    /* ── Puces de commandes ─────────────────────── */
    .cmd-list {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      max-width: 580px;
      justify-content: center;
      background: rgba(255,255,255,0.65);
      border: 3px dashed #c9b8e8;
      border-radius: 20px;
      padding: 12px 16px;
      min-height: 72px;
      min-width: 340px;
      margin-bottom: 20px;
    }

    .chip {
      font-family: 'Fredoka One', sans-serif;
      font-size: 0.92rem;
      letter-spacing: 0.02em;
      padding: 6px 16px;
      border-radius: 50px;
      border: none;
      background: #e8d5f5;
      color: #6b3fa0;
      cursor: pointer;
      transition: background 0.12s, transform 0.1s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 0 rgba(0,0,0,0.10);
    }
    .chip.cmd-move      { background: #4fc3f7; color: #fff; }
    .chip.cmd-move:hover { background: #29b6f6; }
    .chip.cmd-turnleft  { background: #ce93d8; color: #fff; }
    .chip.cmd-turnleft:hover { background: #ba68c8; }
    .chip.cmd-turn      { background: #f48fb1; color: #fff; }
    .chip.cmd-turn:hover { background: #f06292; }
    .chip:active { transform: scale(0.95); }
    .chip.active    { background: #ffb74d; color: #fff; cursor: default; transform: none; box-shadow: 0 2px 0 rgba(0,0,0,0.12); }
    .chip.error     { background: #ef5350; color: #fff; }
    .chip.replacing { outline: 3px dashed #fff; outline-offset: 2px; animation: pulse-replacing 0.45s ease infinite alternate; }
    @keyframes pulse-replacing { from { transform: scale(1); } to { transform: scale(1.1); } }

    /* ── Bouton Lancer / Recommencer ───────────── */
    .btn-run {
      font-family: 'Fredoka One', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 0.03em;
      background: #69e28a;
      color: #fff;
      padding: 16px 56px;
      min-width: 230px;
      border-radius: 50px;
      margin-bottom: 14px;
      border: none;
      border-bottom: 5px solid #2eaa55;
      box-shadow: 0 4px 16px rgba(46,174,85,0.35);
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-run:active { transform: translateY(3px); box-shadow: 0 1px 8px rgba(46,174,85,0.25); }
    .btn-run:disabled { opacity: 0.35; cursor: default; transform: none; }
    .btn-run.is-reset {
      background: #ffb74d;
      border-bottom-color: #e65100;
      box-shadow: 0 4px 16px rgba(255,152,0,0.35);
    }

    .win-msg {
      font-family: 'Fredoka One', sans-serif;
      color: #ff6f00;
      font-size: 1.3rem;
      letter-spacing: 0.02em;
      margin-bottom: 14px;
      text-align: center;
      animation: bounce 0.5s ease infinite alternate;
    }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-6px); } }

    .tip {
      font-size: 0.78rem;
      font-family: 'Nunito', sans-serif;
      color: #9c7bbf;
      letter-spacing: 0em;
    }
  </style>
</head>
<body>

  <div class="game">
    <div class="grid-card">
      <div class="grid" id="grid">
        <div class="trophy" id="trophy">🏆</div>
        <div class="robot"  id="robot">🚀</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-move"      id="btnMove"      onclick="addCmd('Move')">⬆️ Avancer</button>
      <button class="btn btn-turn-left" id="btnTurnLeft" onclick="addCmd('TurnLeft')">↪️ Gauche</button>
      <button class="btn btn-turn"      id="btnTurn"     onclick="addCmd('Turn')">↩️ Droite</button>
    </div>

    <div class="cmd-list" id="cmdList"></div>

    <div class="win-msg" id="winMsg" style="display:none">
      🎉 Bravo ! Tu as trouvé le trésor !
    </div>

    <button class="btn btn-run" id="btnRun" onclick="runOrReset()">▶ Lancer</button>
    <p class="tip">Clique sur une instruction pour la retirer</p>
  </div>

  <script>
    const ROWS = 7, COLS = 7;
    const START    = { row: 6, col: 0 };
    const TREASURE = { row: 6, col: 6 };
    const CELL = 61, GAP = 3, STEP = CELL + GAP; // 64px par case

    // 0=Nord 1=Est 2=Sud 3=Ouest
    const DELTA  = [[-1,0],[0,1],[1,0],[0,-1]];
    const ANGLES = [0, 90, 180, 270];

    const LABELS = { Move: '⬆️ Avancer', TurnLeft: '↪️ Gauche', Turn: '↩️ Droite' };

    /* ── Génération du labyrinthe (DFS backtracking) ── */
    function shuffle(a) {
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function generateMaze() {
      const g = Array.from({length: ROWS}, () => Array(COLS).fill(1));
      const seen = new Set();

      function carve(r, c) {
        g[r][c] = 0;
        seen.add(r * COLS + c);
        for (const [dr, dc] of shuffle([[-2,0],[2,0],[0,-2],[0,2]])) {
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && !seen.has(nr * COLS + nc)) {
            g[r + dr / 2][c + dc / 2] = 0;
            carve(nr, nc);
          }
        }
      }

      carve(START.row, START.col);
      return g;
    }

    /* ── État du jeu ────────────────────────────── */
    let MAZE = generateMaze();
    let cmds = [];
    let running = false, crashed = false, won = false;
    let errorIdx = -1, replaceIdx = null;

    /* ── Construction / reconstruction de la grille ── */
    function buildGrid() {
      const g = document.getElementById('grid');
      g.querySelectorAll('.cell').forEach(el => el.remove());
      const frag = document.createDocumentFragment();
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++) {
          const d = document.createElement('div');
          d.className = 'cell' + (MAZE[r][c] ? ' wall' : '');
          frag.appendChild(d);
        }
      g.prepend(frag);
      posSprite('trophy', TREASURE.row, TREASURE.col);
      posSprite('robot',  START.row,    START.col, 0);
    }

    function posSprite(id, row, col, dir) {
      const el = document.getElementById(id);
      el.style.left = col * STEP + 'px';
      el.style.top  = row * STEP + 'px';
      if (dir !== undefined)
        el.style.transform = `rotate(${ANGLES[dir]}deg)`;
    }

    /* ── Surlignage de case ─────────────────────── */
    function simulateTo(idx) {
      let r = START.row, c = START.col, dir = 0;
      // Exécute les commandes 0..idx-1
      for (let i = 0; i < idx; i++) {
        if (cmds[i] === 'Move') {
          const [dr, dc] = DELTA[dir];
          const nr = r + dr, nc = c + dc;
          if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS || MAZE[nr][nc]) return null;
          r = nr; c = nc;
        } else if (cmds[i] === 'TurnLeft') {
          dir = (dir + 3) % 4;
        } else {
          dir = (dir + 1) % 4;
        }
      }
      // Évalue la commande idx
      if (cmds[idx] === 'Move') {
        const [dr, dc] = DELTA[dir];
        const nr = r + dr, nc = c + dc;
        if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) return { r, c, invalid: true };
        if (MAZE[nr][nc]) return { r: nr, c: nc, invalid: true };
        return { r: nr, c: nc, invalid: false };
      }
      return { r, c, invalid: false };
    }

    function highlightCell(row, col, invalid = false) {
      clearHighlight();
      const cells = document.querySelectorAll('#grid .cell');
      const cell = cells[row * COLS + col];
      if (cell) cell.classList.add(invalid ? 'highlight-error' : 'highlight');
    }

    function clearHighlight() {
      document.querySelectorAll('#grid .cell.highlight, #grid .cell.highlight-error')
        .forEach(el => el.classList.remove('highlight', 'highlight-error'));
    }

    /* ── Liste de commandes ─────────────────────── */
    function renderCmds(active = -1) {
      const list = document.getElementById('cmdList');
      list.innerHTML = '';
      cmds.forEach((cmd, i) => {
        const s = document.createElement('span');
        const colorClass = { Move: 'cmd-move', TurnLeft: 'cmd-turnleft', Turn: 'cmd-turn' }[cmd];
        s.className = 'chip ' + colorClass +
          (i === active    ? ' active'    : '') +
          (i === errorIdx  ? ' error'     : '') +
          (i === replaceIdx ? ' replacing' : '');
        s.textContent = LABELS[cmd];
        s.addEventListener('mouseenter', () => {
          const pos = simulateTo(i);
          if (pos) highlightCell(pos.r, pos.c, pos.invalid);
        });
        s.addEventListener('mouseleave', clearHighlight);
        if (!running) s.onclick = () => {
          if (i === errorIdx) {
            replaceIdx = (replaceIdx === i) ? null : i;
            renderCmds();
          } else {
            cmds.splice(i, 1);
            renderCmds();
          }
        };
        list.appendChild(s);
      });
    }

    function addCmd(c) {
      if (running || won) return;
      if (replaceIdx !== null) {
        cmds[replaceIdx] = c;
        replaceIdx = null;
        errorIdx = -1;
        crashed = false;
        setRunBtn('▶ Lancer', false);
        posSprite('robot', START.row, START.col, 0);
        renderCmds();
        return;
      }
      cmds.push(c);
      renderCmds();
    }

    /* ── Lancer / Recommencer ───────────────────── */
    function runOrReset() {
      if (crashed || won)          { doReset(); return; }
      if (running || !cmds.length) return;
      runProgram();
    }

    async function runProgram() {
      running = true;
      setBtns(true);

      let r = START.row, c = START.col, dir = 0;
      posSprite('robot', r, c, dir);

      for (let i = 0; i < cmds.length; i++) {
        renderCmds(i);
        await sleep(320);

        if (cmds[i] === 'Move') {
          const [dr, dc] = DELTA[dir];
          const nr = r + dr, nc = c + dc;
          if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS || MAZE[nr][nc]) {
            errorIdx = i;
            doCrash();
            renderCmds(-1);
            return;
          }
          r = nr; c = nc;
        } else if (cmds[i] === 'TurnLeft') {
          dir = (dir + 3) % 4;
        } else {
          dir = (dir + 1) % 4;
        }

        posSprite('robot', r, c, dir);

        if (r === TREASURE.row && c === TREASURE.col) {
          renderCmds();
          await sleep(200);
          doWin();
          return;
        }
      }

      running = false;
      setBtns(false);
      renderCmds();
    }

    function doCrash() {
      crashed = true; running = false;
      setRunBtn('🔄 Recommencer', true);
      setBtns(false);
    }

    function doWin() {
      won = true; running = false;
      document.getElementById('winMsg').style.display = 'block';
      setRunBtn('🔄 Recommencer', true);
    }

    function doReset() {
      const wasWon = won;
      crashed = won = running = false;
      errorIdx = -1; replaceIdx = null;
      document.getElementById('winMsg').style.display = 'none';
      setRunBtn('▶ Lancer', false);
      setBtns(false);
      if (wasWon) {
        cmds = [];
        MAZE = generateMaze();
        buildGrid();
      } else {
        posSprite('robot', START.row, START.col, 0);
      }
      renderCmds();
    }

    function setRunBtn(label, isReset) {
      const btn = document.getElementById('btnRun');
      btn.textContent = label;
      btn.classList.toggle('is-reset', isReset);
    }

    function setBtns(disabled) {
      document.getElementById('btnMove').disabled     = disabled;
      document.getElementById('btnTurnLeft').disabled = disabled;
      document.getElementById('btnTurn').disabled     = disabled;
    }

    function sleep(ms) { return new Promise(res => setTimeout(res, ms)); }

    /* ── Init ──────────────────────────────────── */
    buildGrid();
    renderCmds();
  </script>
</body>
</html>
